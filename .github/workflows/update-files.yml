name: Generate Files List

on:
  push:
    branches: [ main ] # Eğer ana dalın adı 'master' ise burayı 'master' yapın.

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate files.json
        run: |
          echo "[" > files.json
          FIRST=true
          
          # Mevcut dizindeki tüm öğeleri tara
          for f in *; do
            # Sadece dosyaysa (-f) ve gizlenmesi gerekenlerden değilse ekle
            if [ -f "$f" ] && \
               [ "$f" != "files.json" ] && \
               [ "$f" != "index.html" ] && \
               [ "$f" != "articles.json" ] && \
               [ "$f" != "update-files.yml" ] && \
               [ "$f" != "CNAME" ] && \
               [ "$f" != "README.md" ] && \
               [ "$f" != ".gitignore" ]; then
              
              if [ "$FIRST" = false ]; then echo "," >> files.json; fi
              
              SIZE=$(stat -c%s "$f")
              DATE=$(date -r "$f" "+%Y-%m-%d")
              
              echo "{\"name\": \"$f\", \"size\": $SIZE, \"date\": \"$DATE\"}" >> files.json
              FIRST=false
            fi
          done
          
          echo "]" >> files.json

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add files.json
          # Eğer değişiklik yoksa hata vermeden çık
          git commit -m "Automated files.json update" || exit 0
          git push
